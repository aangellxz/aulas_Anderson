<body>
    <h1><strong>Termos de Serviço</strong></h1>

    <div class="caixa caixa-obrigacoes">
        <h2><strong>Obrigações do Usuário</strong></h2>
        <ul>
            <li>Registrar dados verdadeiros</li>
            <li>Não compartilhar credenciais</li>
            <li>Respeitar as políticas comerciais</li>
        </ul>
    </div>

    <div class="caixa caixa-cancelamento">
        <h2><strong>Cancelamento de Conta</strong></h2>
        <ol>
            <li>Acessar o painel de configurações</li>
            <li>Clicar no botão <strong>"Encerrar Conta"</strong></li>
            <li>Confirmar o token enviado por e-mail</li>
        </ol>
    </div>
