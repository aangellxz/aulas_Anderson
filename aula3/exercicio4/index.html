<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planos SaaS</title>
  <link rel="stylesheet" href="/aula3/exercicio4/styles.css">
</head>
<body>

  <h1>Escolha seu Plano</h1>

  <table>
    <thead>
      <tr>
        <th>Plano</th>
        <th>Preço</th>
        <th>Usuários</th>
        <th>Suporte</th>
      </tr>
    </thead>
    <tbody id="corpo-tabela">
      <tr>
        <td>Básico</td>
        <td>R$ 29/mês</td>
        <td>1 usuário</td>
        <td>E-mail</td>
      </tr>
      <tr>
        <td>Profissional</td>
        <td>R$ 79/mês</td>
        <td>5 usuários</td>
        <td>Chat + E-mail</td>
      </tr>
      <tr>
        <td>Empresarial</td>
        <td>R$ 199/mês</td>
        <td>Ilimitado</td>
        <td>Prioritário 24/7</td>
      </tr>
    </tbody>
  </table>

  <script src="/aula3/exercicio4/script.js"></script>

</html>
