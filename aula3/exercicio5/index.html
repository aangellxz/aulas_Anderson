<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Feedback</title>
  <link rel="stylesheet" href="/aula3/exercicio5/styles.css">
</head>
<body>

  <h1>Formulário de Feedback</h1>

  <form>

    <textarea id="comentario" maxlength="250" rows="5"></textarea>

    <p id="contador">0 / 200 caracteres</p>

    <button id="btn-enviar" type="submit">Enviar</button>
  </form>

  <script src="/aula3/exercicio5/script.js"></script>
