<!DOCTYPE html>
<html lang="pt-br">
<head>

  <title>Dashboard Operacional</title>
  <link rel="stylesheet" href="/aula3/exercicio10/styles.css">

<body>

  <h1>Dashboard Operacional</h1>

  <div class="dashboard">
    <div class="card">
      <button class="btn-fechar">X</button>
      <h2>Servidor Principal</h2>
      <p>Status: Online</p>
    </div>

    <div class="card">
      <button class="btn-fechar">X</button>
      <h2>Monitor de Rede</h2>
      <p>Status: Estável</p>
    </div>

    <div class="card">
      <button class="btn-fechar">X</button>
      <h2>Banco de Dados</h2>
      <p>Status: Online</p>
    </div>

    <div class="card">
      <button class="btn-fechar">X</button>
      <h2>Fila de Processamento</h2>
      <p>Status: 12 tarefas</p>
    </div>
  </div>

  <script src="/aula3/exercicio10/script.js"></script>

</html>
